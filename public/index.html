<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Stats Builder</title>
    <meta
      name="description"
      content="Build a custom GitHub profile stats card by picking individual stats and charts."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&family=JetBrains+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="app-skeleton" class="app-skeleton" aria-hidden="true">
      <div class="skeleton-nav">
        <span class="skeleton-line skeleton-line--brand"></span>
        <span class="skeleton-line skeleton-line--nav"></span>
      </div>
      <div class="skeleton-dashboard">
        <div class="skeleton-card skeleton-toolbar">
          <span class="skeleton-line skeleton-line--input"></span>
          <span class="skeleton-pill"></span>
        </div>
        <div class="skeleton-card skeleton-preview">
          <span class="skeleton-line skeleton-line--title"></span>
          <div class="skeleton-preview-stage"></div>
          <span class="skeleton-line skeleton-line--button"></span>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
